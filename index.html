<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>NotebookLM Clone</title>

    <link
        rel="stylesheet"
        href="style.css"
    />
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>NotebookLM Clone</h1>

            <p class="subtitle">
                Upload a PDF and chat with it using RAG
            </p>

            <!-- Upload Section -->
            <div class="section">

                <h2>Upload PDF</h2>

                <input
                    type="file"
                    id="file"
                    accept=".pdf"
                />

                <button onclick="uploadPDF()">
                    Upload
                </button>

                <p id="uploadStatus"></p>

            </div>

            <!-- Chat Section -->
            <div class="section">

                <h2>Ask Questions</h2>

                <div class="chat-box" id="chatBox">

                    <div class="bot-message">
                        Upload a PDF to begin.
                    </div>

                </div>

                <div class="input-row">

                    <input
                        type="text"
                        id="question"
                        placeholder="Ask something about the document..."
                    />

                    <button onclick="askQuestion()">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
